<!DOCTYPE html>
<html>
<head>
	<title>Формы</title>
</head>
<body>
<form>

<input type="email" name=""  placeholder="Введите почту">

<input type="number" name=""  placeholder="Введите число" min="0" max="38">
<textarea placeholder="Опишите себя"></textarea>
<select>
	<option>Январь</option>
	<option>Февраль</option>
	<option>Март</option>
</select>

<input type="radio" name="r">Майнкрафт
<input type="radio" name="r">Роблокс

<input type="checkbox" name="r">Пицца
<input type="checkbox" name="r">Суши
<input type="checkbox" name="r">Бургер

<input type="button" name="" value="Кнопка">
<button>Кнопка</button>
<input type="reset" name="" value="Очистка"


</form>
</body>
</html>
