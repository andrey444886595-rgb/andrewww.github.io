<!DOCTYPE html>
<html>
<head>
	<title>Анимация</title>
	<style type="text/css">
	.s
	{
	width: 100px;
	height: 100px;
	background: linear-gradient(45deg,#B0E0E6,#FAFAD2,blue);
	border-radius:15px;
	margin:20px auto;
	animation: spin 3s infinite linear;
	}

@keyframes spin
{
   from
   {
     transform: rotate(0deg);
   }
to
{
	transform: rotate(360deg);
}

}
.sd
{
font-size: 100px;
display: flex;
justify-content: center;
animation: sdd 3s infinite linear;
}
@keyframes sdd
{
0%,100%
{
transform: scale(1) translateY(100px);
opacity: 1;	
}
25%
{
transform: scale(1.3)translateY(-25px);
opacity: 0.8;
}
50%
{
transform: scale(1.6);
}
75%
{
transform: scale(1.3);
}




	</style>
</head>
<body>
<div class="s"></div>
<div class="sd">🤖</div>

</body>

</html>
